{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-white">
                <h5 class="mb-0"><i class="bi bi-calendar-date me-2"></i>Update Return Date</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="newdate" class="form-label">New Return Date</label>
                        <input type="date" class="form-control" id="newdate" name="newdate" value="{{ returndate|date:'Y-m-d' }}" required>
                    </div>
                    
                    <div class="d-flex justify-content-end gap-2">
                        <a href="{% url 'admin' %}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-gradient">
                            <i class="bi bi-check-circle"></i> Update
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
